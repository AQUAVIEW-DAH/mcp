name: New source request
description: Request that AQUAVIEW index a new ocean / atmospheric / marine data source
labels: ["source-request"]
body:
  - type: markdown
    attributes:
      value: |
        AQUAVIEW prioritizes sources with stable APIs and authoritative provenance. We index ERDDAP, STAC, THREDDS, and well-documented HTTP APIs most easily.

  - type: input
    id: name
    attributes:
      label: Source name
      placeholder: e.g. JCOMMOPS, BCO-DMO, EUMETSAT MARINE
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Source URL
      placeholder: e.g. https://example.org/erddap
    validations:
      required: true

  - type: dropdown
    id: api
    attributes:
      label: API type
      options:
        - ERDDAP
        - STAC
        - THREDDS / OPeNDAP
        - HTTP / REST
        - OGC WMS / WFS / WCS
        - Bulk download (S3 / GCS)
        - Other
    validations:
      required: true

  - type: textarea
    id: variables
    attributes:
      label: Variables / dataset families
      description: What's in this source that would be valuable in AQUAVIEW?
      placeholder: |
        e.g. Underwater glider missions in the Mediterranean; CTD profiles
        with temperature, salinity, oxygen; ~5,000 missions, 2010-present.

  - type: textarea
    id: license
    attributes:
      label: License / terms of use
      placeholder: e.g. CC-BY 4.0, public domain, NOAA data policy

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
