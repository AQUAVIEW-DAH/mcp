name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "**.md"
      - "**.ipynb"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
      - "assets/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mkdocs-${{ hashFiles('.github/workflows/docs.yml') }}
          restore-keys: ${{ runner.os }}-pip-mkdocs-

      - name: Install dependencies
        run: |
          pip install \
            mkdocs-material \
            mkdocs-material-extensions \
            mkdocs-same-dir \
            mkdocs-jupyter \
            pymdown-extensions

      - name: Build site
        run: mkdocs build --clean

      - name: Copy root-level static files (verification, robots.txt, etc.)
        run: |
          shopt -s nullglob
          cp googlede65ae2d6b85ec90.html _site/ 2>/dev/null || true
          cp robots.txt _site/ 2>/dev/null || true
          cp CNAME _site/ 2>/dev/null || true
          ls -la _site/ | head -20

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
